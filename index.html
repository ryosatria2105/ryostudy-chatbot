<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RyoStudy AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <div class="chat-card">

      <!-- Header -->
      <header class="chat-header">
        <div class="header-avatar">
          <img src="assets/logo-fix.png" alt="RyoStudy AI Logo" class="header-logo" />
        </div>
        <div class="header-info">
          <h1>RyoStudy AI</h1>
          <span class="subtitle">
            <span class="status-dot"></span>
            AI Study Assistant
          </span>
        </div>
        <div class="header-badge">Beta</div>
      </header>

      <!-- Chat Area -->
      <div id="chat-box" class="chat-box">
        <div class="welcome-message">
          <div class="welcome-icon">
            <img src="assets/logo-fix.png" alt="RyoStudy AI" class="welcome-logo" />
          </div>
          <p>Halo! Saya <strong>RyoStudy AI</strong> — teman belajarmu. Kamu bisa kirim teks, gambar, dokumen, atau audio.</p>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="bot-avatar">
          <img src="assets/logo-fix.png" alt="AI" class="bot-logo" />
        </div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="typing-label">AI is typing…</span>
      </div>

      <!-- Input Area -->
      <div class="input-area">

        <!-- File preview strip -->
        <div id="file-preview" class="file-preview hidden">
          <span id="file-preview-name">📎 file.pdf</span>
          <button id="clear-file-btn" class="clear-file" title="Hapus file">✕</button>
        </div>

        <div class="input-row">
          <!-- Custom file button -->
          <label for="file-input" class="file-label" title="Lampirkan file (gambar/dokumen/audio)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </label>
          <input type="file" id="file-input" accept="image/*,audio/*,.pdf,.doc,.docx,.txt,.ppt,.pptx,.xls,.xlsx" />

          <input
            type="text"
            id="message-input"
            placeholder="Tanya apa saja…"
            autocomplete="off"
          />

          <button id="send-btn" title="Kirim">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        <p class="input-hint">Mendukung teks, gambar, dokumen & audio · Enter untuk kirim</p>
      </div>

    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
